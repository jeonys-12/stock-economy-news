name: Collect and Deploy News

on:
  schedule:
    # 매일 오전 6시 30분(KST) = 전날 21시 30분(UTC)
    - cron: "30 21 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "style.css"
      - "app.js"
      - "multifactor-ui.js"
      - "multifactor-ui.css"
      - "priority-sort.js"
      - "count-badges.js"
      - "count-badges.css"
      - "default-daily.js"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write

concurrency:
  group: news-pages-deploy
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Register secret masks and verify configuration
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          for value in "$OPENDART_API_KEY" "$KRX_API_KEY" "$OPENAI_API_KEY"; do
            if [ -n "$value" ]; then echo "::add-mask::$value"; fi
          done
          python - <<'PY'
          import os
          required = ("OPENDART_API_KEY", "KRX_API_KEY", "OPENAI_API_KEY")
          missing = [name for name in required if not os.getenv(name, "").strip()]
          if missing:
              raise SystemExit("Missing GitHub Secrets: " + ", ".join(missing))
          print("Required API secrets are configured and masked")
          PY

      - name: Preserve previous stock factor cache
        run: |
          if [ -f data/stock_data.json ]; then
            cp data/stock_data.json /tmp/stock_data_previous.json
          else
            echo '{}' > /tmp/stock_data_previous.json
          fi

      - name: Collect news
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
        run: python scripts/collect_news.py

      - name: Collect fixed recommendation stock factors
        continue-on-error: true
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python scripts/collect_expanded_stock_data.py

      - name: Validate and repair fixed stock factor data
        continue-on-error: true
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          PREVIOUS_STOCK_DATA: /tmp/stock_data_previous.json
        run: python scripts/repair_stock_factors.py

      - name: Enrich with KRX official market data
        continue-on-error: true
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python scripts/collect_krx_official.py

      - name: Sanitize collected data before AI analysis
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/sanitize_outputs.py

      - name: Generate OpenAI fixed-watchlist market briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-mini
        run: python scripts/generate_expanded_ai_briefing.py

      - name: Final secret sanitization
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/sanitize_outputs.py

      - name: Commit updated data
        run: |
          if git diff --quiet data/news.json data/stock_data.json; then
            echo "No data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/news.json
            if [ -f data/stock_data.json ]; then git add data/stock_data.json; fi
            git commit -m "chore: update news and stock factor data"
            git push origin main
          fi

      - name: Prepare static site
        run: |
          rm -rf public
          mkdir -p public/data
          cp index.html style.css app.js multifactor-ui.js multifactor-ui.css priority-sort.js count-badges.js count-badges.css default-daily.js .nojekyll public/
          cp data/news.json public/data/news.json
          if [ -f data/stock_data.json ]; then cp data/stock_data.json public/data/stock_data.json; fi

      - name: Publish to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: update news dashboard"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
