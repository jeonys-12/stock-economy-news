name: Collect and Deploy News

on:
  schedule:
    # 매일 오전 6시 30분(KST) = 전날 21시 30분(UTC)
    - cron: "30 21 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "style.css"
      - "section-navigation.css"
      - "app.js"
      - "multifactor-ui.js"
      - "multifactor-ui.css"
      - "stock-monitoring-ui.js"
      - "stock-monitoring-ui.css"
      - "quality-value-ui.js"
      - "quality-value-ui.css"
      - "priority-sort.js"
      - "count-badges.js"
      - "count-badges.css"
      - "default-daily.js"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write

concurrency:
  group: news-pages-deploy
  cancel-in-progress: true

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PUBLIC_MARKET_WORKERS: "6"
      QUALITY_ANALYSIS_WORKERS: "5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --disable-pip-version-check -r requirements.txt

      - name: Preserve previous stock cache
        run: |
          if [ -f data/stock_data.json ]; then
            cp data/stock_data.json /tmp/stock_data_previous.json
          else
            echo '{}' > /tmp/stock_data_previous.json
          fi

      - name: Collect and filter news
        run: |
          python scripts/collect_news.py
          python scripts/filter_news_exclusions.py

      - name: Prepare stock universe
        run: python scripts/collect_expanded_stock_data.py

      - name: Collect NAVER price valuation target and investor flow
        env:
          PREVIOUS_STOCK_DATA: /tmp/stock_data_previous.json
        run: python scripts/collect_public_market_fast.py

      - name: Analyze NAVER main page Financial Summary
        env:
          QUALITY_ANALYSIS_WORKERS: "5"
        run: python scripts/analyze_naver_financial_summary.py

      - name: Validate Kia required Financial Summary metrics
        run: python scripts/validate_naver_financial_summary.py

      - name: Normalize investor flow fields
        run: python scripts/normalize_investor_flow_fields.py

      - name: Generate OpenAI market briefing
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-mini
        run: python scripts/generate_expanded_ai_briefing.py

      - name: Sanitize outputs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/sanitize_outputs.py

      - name: Commit updated data
        run: |
          if git diff --quiet data/news.json data/stock_data.json; then
            echo "No data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/news.json data/stock_data.json
            git commit -m "chore: update NAVER stock screening and news"
            git push origin main
          fi

      - name: Prepare static site
        run: |
          rm -rf public
          mkdir -p public/data
          cp index.html style.css section-navigation.css app.js multifactor-ui.js multifactor-ui.css stock-monitoring-ui.js stock-monitoring-ui.css quality-value-ui.js quality-value-ui.css priority-sort.js count-badges.js count-badges.css default-daily.js .nojekyll public/
          cp data/news.json data/stock_data.json public/data/

      - name: Publish to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "deploy: update news dashboard"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force --quiet origin gh-pages
