name: Collect and Deploy News

on:
  schedule:
    # 매일 오전 6시 30분(KST) = 전날 21시 30분(UTC)
    - cron: "30 21 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "style.css"
      - "app.js"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Collect news
        run: python scripts/collect_news.py

      - name: Commit updated news data
        run: |
          if git diff --quiet data/news.json; then
            echo "No data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/news.json
            git commit -m "chore: update economic news data"
            git push
          fi

      - name: Configure or enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: collect
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
