name: Collect and Deploy News

on:
  schedule:
    # 매일 오전 6시 30분(KST) = 전날 21시 30분(UTC)
    - cron: "30 21 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "style.css"
      - "app.js"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write

concurrency:
  group: news-pages-deploy
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect news
        run: python scripts/collect_news.py

      - name: Commit updated news data
        run: |
          if git diff --quiet data/news.json; then
            echo "No data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/news.json
            git commit -m "chore: update economic news data"
            git push origin main
          fi

      - name: Prepare static site
        run: |
          rm -rf public
          mkdir -p public/data
          cp index.html style.css app.js .nojekyll public/
          cp data/news.json public/data/news.json

      - name: Publish to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: update news dashboard"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
