name: Collect and Deploy News

on:
  schedule:
    # 매일 오전 6시 30분(KST) = 전날 21시 30분(UTC)
    - cron: "30 21 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "style.css"
      - "app.js"
      - "multifactor-ui.js"
      - "multifactor-ui.css"
      - "priority-sort.js"
      - "count-badges.js"
      - "count-badges.css"
      - "default-daily.js"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write

concurrency:
  group: news-pages-deploy
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify OpenDART configuration
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
        run: |
          python - <<'PY'
          import os
          key = os.getenv("OPENDART_API_KEY", "").strip()
          if not key:
              raise SystemExit("OPENDART_API_KEY is not configured")
          print(f"OPENDART_API_KEY configured: yes (length={len(key)})")
          PY

      - name: Collect news
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
        run: python scripts/collect_news.py

      - name: Collect DART FnGuide KRX stock factors
        continue-on-error: true
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
        run: python scripts/collect_stock_data.py

      - name: Generate OpenAI multifactor market briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-mini
        run: python scripts/generate_ai_briefing.py

      - name: Commit updated data
        run: |
          if git diff --quiet data/news.json data/stock_data.json; then
            echo "No data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/news.json
            if [ -f data/stock_data.json ]; then git add data/stock_data.json; fi
            git commit -m "chore: update news and stock factor data"
            git push origin main
          fi

      - name: Prepare static site
        run: |
          rm -rf public
          mkdir -p public/data
          cp index.html style.css app.js multifactor-ui.js multifactor-ui.css priority-sort.js count-badges.js count-badges.css default-daily.js .nojekyll public/
          cp data/news.json public/data/news.json
          if [ -f data/stock_data.json ]; then cp data/stock_data.json public/data/stock_data.json; fi

      - name: Publish to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: update news dashboard"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
