name: Verify Financials Weekly

on:
  schedule:
    # 매주 일요일 오전 5시(KST) = 토요일 20시(UTC)
    - cron: "0 20 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-pages-deploy
  cancel-in-progress: false

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      QUALITY_ANALYSIS_WORKERS: "5"
      DART_LATEST_WORKERS: "5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --disable-pip-version-check -r requirements.txt

      - name: Verify OpenDART secret
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
        run: |
          if [ -z "$OPENDART_API_KEY" ]; then
            echo "OPENDART_API_KEY is missing"
            exit 1
          fi
          echo "::add-mask::$OPENDART_API_KEY"

      - name: Refresh latest quarterly financials with correct comparison periods
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          DART_LATEST_WORKERS: "5"
        run: python scripts/refresh_latest_dart_financials.py

      - name: Verify 3 to 5 year financial trends with OpenDART
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          QUALITY_ANALYSIS_MODE: weekly
          QUALITY_ANALYSIS_WORKERS: "5"
        run: python scripts/analyze_quality_value.py

      - name: Normalize investor flow fields
        run: python scripts/normalize_investor_flow_fields.py

      - name: Sanitize verified data
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
        run: python scripts/sanitize_outputs.py

      - name: Commit verified stock data
        run: |
          if git diff --quiet data/stock_data.json; then
            echo "No verified data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/stock_data.json
            git commit -m "chore: verify stock financials with OpenDART"
            git push origin main
          fi

      - name: Prepare static site
        run: |
          rm -rf public
          mkdir -p public/data
          cp index.html style.css section-navigation.css app.js multifactor-ui.js multifactor-ui.css stock-monitoring-ui.js stock-monitoring-ui.css quality-value-ui.js quality-value-ui.css priority-sort.js count-badges.js count-badges.css default-daily.js .nojekyll public/
          cp data/news.json data/stock_data.json public/data/

      - name: Publish verified dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "deploy: publish verified stock dashboard"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force --quiet origin gh-pages
