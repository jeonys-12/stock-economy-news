<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="대한민국과 미국의 경제정책, 금융시장, 건설·부동산 뉴스를 한곳에서 확인하는 대시보드">
  <title>주식 / 경제 뉴스 몰아보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="container hero-inner">
      <div>
        <p class="eyebrow">KOREA · UNITED STATES</p>
        <h1>주식 / 경제 뉴스 몰아보기</h1>
        <p class="hero-copy">경제정책, 금융시장, 건설·부동산 뉴스를 매일 아침 빠르게 확인합니다.</p>
      </div>
      <div class="update-box">
        <span>최근 업데이트</span>
        <strong id="updatedAt">확인 중</strong>
        <button id="refreshButton" type="button">새로고침</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="summary-grid" aria-label="뉴스 요약">
      <article class="summary-card"><span>전체 뉴스</span><strong id="totalCount">0</strong></article>
      <article class="summary-card"><span>최근 24시간</span><strong id="dailyCount">0</strong></article>
      <article class="summary-card"><span>대한민국</span><strong id="koreaCount">0</strong></article>
      <article class="summary-card"><span>미국</span><strong id="usaCount">0</strong></article>
    </section>

    <section class="control-panel" aria-label="뉴스 필터">
      <div class="control-row">
        <div class="control-group">
          <span class="control-label">국가</span>
          <div class="button-group" id="countryFilters">
            <button class="filter-button active" data-country="all">전체</button>
            <button class="filter-button" data-country="대한민국">대한민국</button>
            <button class="filter-button" data-country="미국">미국</button>
          </div>
        </div>
        <div class="control-group">
          <span class="control-label">기간</span>
          <div class="button-group" id="periodFilters">
            <button class="filter-button active" data-period="7">7일</button>
            <button class="filter-button" data-period="1">24시간</button>
            <button class="filter-button" data-period="30">30일</button>
          </div>
        </div>
      </div>

      <div class="control-row category-row">
        <div class="control-group grow">
          <span class="control-label">분야</span>
          <div class="button-group" id="categoryFilters">
            <button class="filter-button active" data-category="all">전체</button>
            <button class="filter-button" data-category="경제정책">경제정책</button>
            <button class="filter-button" data-category="금융시장">금융시장</button>
            <button class="filter-button" data-category="건설·부동산">건설·부동산</button>
          </div>
        </div>
        <label class="search-box">
          <span class="sr-only">뉴스 검색</span>
          <input id="searchInput" type="search" placeholder="기업명, 정책, 종목 키워드 검색">
        </label>
      </div>
    </section>

    <section class="section-heading">
      <div>
        <p class="eyebrow dark">LATEST MONITORING</p>
        <h2>주요 뉴스</h2>
      </div>
      <div class="sort-control">
        <label for="sortSelect">정렬</label>
        <select id="sortSelect">
          <option value="importance">중요도순</option>
          <option value="latest">최신순</option>
        </select>
      </div>
    </section>

    <section id="newsGrid" class="news-grid" aria-live="polite"></section>
    <div id="emptyState" class="empty-state" hidden>조건에 맞는 뉴스가 없습니다.</div>
    <button id="loadMoreButton" class="load-more" type="button" hidden>더 보기</button>
  </main>

  <footer>
    <div class="container footer-inner">
      <p>공개 RSS 기반 뉴스 모니터링 · 기사 원문은 각 언론사에서 확인</p>
      <p>투자 참고용이며 투자 판단과 결과의 책임은 이용자에게 있습니다.</p>
    </div>
  </footer>

  <template id="newsCardTemplate">
    <article class="news-card">
      <div class="card-meta">
        <span class="country-badge"></span>
        <span class="category-badge"></span>
        <span class="importance-badge"></span>
      </div>
      <h3><a class="news-link" target="_blank" rel="noopener noreferrer"></a></h3>
      <p class="news-description"></p>
      <div class="card-footer">
        <span class="news-source"></span>
        <time class="news-date"></time>
      </div>
    </article>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
